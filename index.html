<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT7 Leaderboard — Suzuka Circuit</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #7a6228;
    --silver: #8a9ab8;
    --bronze: #a0622a;
    --bg: #060910;
    --bg2: #0a0f1c;
    --bg3: #0d1425;
    --accent: #1a2540;
    --text: #dde4f0;
    --text-dim: #4a5a7a;
    --red: #e24b4a;
    --teal: #2aa89a;
    --border: rgba(201,168,76,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grille de fond */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left { display: flex; align-items: center; gap: 20px; }

  .logo-box {
    background: var(--bg3);
    border: 1px solid rgba(42,168,154,0.3);
    border-radius: 12px;
    padding: 12px 18px;
  }

  .logo-box svg { width: 100px; height: 60px; display: block; }

  .title-main {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }

  .title-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 6px;
    font-family: 'Orbitron', monospace;
    font-weight: 400;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(226,75,74,0.1);
    border: 1px solid rgba(226,75,74,0.4);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 3px;
  }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.8); }
  }

  .refresh-info {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ── LOADING / ERROR ── */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PODIUM ── */
  .podium-section {
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr;
    gap: 14px;
    margin-bottom: 32px;
    align-items: end;
  }

  .podium-card {
    border-radius: 14px;
    padding: 20px 16px 16px;
    text-align: center;
    border: 1px solid;
    position: relative;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .podium-card.p1 { background: linear-gradient(160deg, #120e00 0%, var(--bg2) 100%); border-color: var(--gold); padding-top: 28px; animation-delay: 0.1s; }
  .podium-card.p2 { background: var(--bg2); border-color: rgba(138,154,184,0.4); animation-delay: 0.2s; }
  .podium-card.p3 { background: var(--bg2); border-color: rgba(160,98,42,0.4); animation-delay: 0.3s; }

  .podium-badge {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 900;
  }
  .p1 .podium-badge { background: var(--gold); color: var(--bg); box-shadow: 0 0 16px rgba(201,168,76,0.5); }
  .p2 .podium-badge { background: var(--silver); color: var(--bg); }
  .p3 .podium-badge { background: var(--bronze); color: var(--bg); }

  .podium-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .p1 .podium-name { color: var(--gold); font-size: 15px; }
  .p2 .podium-name { color: var(--silver); }
  .p3 .podium-name { color: var(--bronze); }

  .podium-company {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .podium-time {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .p1 .podium-time { color: #fff; font-size: 26px; }
  .p2 .podium-time { color: var(--silver); font-size: 20px; }
  .p3 .podium-time { color: var(--bronze); font-size: 20px; }

  .podium-delta {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .p1 .podium-delta { color: var(--gold); }
  .p2 .podium-delta { color: var(--silver); }
  .p3 .podium-delta { color: var(--bronze); }

  .podium-car {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 4px;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.4s both;
  }

  .table-head {
    display: grid;
    grid-template-columns: 50px 1fr 120px 130px 90px;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(201,168,76,0.06);
    border-bottom: 1px solid var(--border);
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .table-body { }

  .table-row {
    display: grid;
    grid-template-columns: 50px 1fr 120px 130px 90px;
    gap: 8px;
    padding: 13px 20px;
    border-bottom: 1px solid rgba(201,168,76,0.07);
    transition: background 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: rgba(201,168,76,0.04); }
  .table-row.top { background: rgba(201,168,76,0.04); }

  .col-rank {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    align-self: center;
  }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .rank-other { color: var(--text-dim); }

  .col-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    align-self: center;
  }
  .col-name.top { color: #fff; }

  .col-company {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    align-self: center;
    text-align: right;
  }

  .col-time {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
    align-self: center;
    text-align: right;
  }

  .col-delta {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    align-self: center;
    text-align: right;
  }

  .leader-pill {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 8px;
    letter-spacing: 2px;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    font-family: 'Orbitron', monospace;
  }

  #last-update { }
  #participant-count { }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-left">
      <div class="logo-box">
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
          <g fill="#2aa89a">
            <rect x="8" y="8" width="22" height="16" rx="3"/>
            <rect x="36" y="8" width="22" height="16" rx="3"/>
            <rect x="64" y="8" width="22" height="16" rx="3"/>
            <rect x="8" y="30" width="22" height="16" rx="3"/>
            <rect x="36" y="30" width="22" height="16" rx="3"/>
            <rect x="64" y="30" width="22" height="16" rx="3"/>
            <rect x="8" y="52" width="22" height="16" rx="3"/>
            <rect x="36" y="52" width="22" height="16" rx="3"/>
            <rect x="64" y="52" width="22" height="16" rx="3"/>
            <polygon points="100,16 114,8 110,22"/>
            <polygon points="116,10 130,3 126,17"/>
            <polygon points="133,5 145,0 140,14"/>
            <polygon points="106,30 122,22 116,37"/>
            <polygon points="124,23 140,15 134,31"/>
            <polygon points="143,17 155,11 150,27"/>
            <polygon points="150,9 160,3 157,19"/>
            <text x="8" y="98" font-family="Arial" font-weight="700" font-size="13" fill="#2aa89a" letter-spacing="2">SUZUKA CIRCUIT</text>
          </g>
        </svg>
      </div>
      <div>
        <div class="title-main">GT7 Leaderboard</div>
        <div class="title-sub">Gran Turismo 7 — Challenge Corporate</div>
      </div>
    </div>
    <div class="header-right">
      <div class="refresh-info" id="last-update">Chargement...</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>

  <div id="podium-section" class="podium-section" style="display:none"></div>

  <div id="table-wrap" class="table-wrap" style="display:none">
    <div class="table-head">
      <div>#</div>
      <div>Pilote</div>
      <div style="text-align:right">Entreprise</div>
      <div style="text-align:right">Meilleur temps</div>
      <div style="text-align:right">Delta</div>
    </div>
    <div class="table-body" id="table-body"></div>
  </div>

  <div id="state-msg" class="state-msg">
    <div class="spinner"></div>
    CHARGEMENT DES DONNÉES...
  </div>

  <div class="footer">
    <div>GT7 CHALLENGE — SUZUKA CIRCUIT</div>
    <div id="participant-count"></div>
  </div>

</div>

<script>
const SHEET_ID = '18noW4f79z97c8ukjiqNaA6L3QgAVEoNECBuEIVwj524';
const SHEET_NAME = 'Feuille 1';
const REFRESH_MS = 60000; // 60 secondes

async function fetchData() {
  const sheetsUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const url = `https://api.allorigins.win/get?url=${encodeURIComponent(sheetsUrl)}`;
  const res = await fetch(url);
  const data = await res.json();
  const text = data.contents;
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;

  // Colonnes : A=Rang(0), B=Nom(1), C=Entreprise(2), D=Horodateur(3), E=Voiture(4), F=Temps(5), G=Delta(6)
  const players = [];
  for (const row of rows) {
    const rang = row.c[0]?.v;
    const nom  = row.c[1]?.v;
    if (!rang || !nom) continue;
    players.push({
      rang:       Math.round(rang),
      nom:        nom,
      entreprise: row.c[2]?.v || '',
      voiture:    row.c[4]?.v || '',
      temps:      row.c[5]?.v || '',
      delta:      row.c[6]?.v || '',
    });
  }
  players.sort((a,b) => a.rang - b.rang);
  return players;
}

function renderPodium(players) {
  const top3 = players.slice(0, 3);
  const order = [top3[1], top3[0], top3[2]].filter(Boolean); // P2, P1, P3
  const classes = ['p2','p1','p3'];
  const nums = ['2','1','3'];

  const section = document.getElementById('podium-section');
  section.innerHTML = '';

  order.forEach((p, i) => {
    if (!p) return;
    const cls = classes[i];
    const num = nums[i];
    const card = document.createElement('div');
    card.className = `podium-card ${cls}`;
    card.style.animationDelay = `${0.1 + i*0.1}s`;
    card.innerHTML = `
      <div class="podium-badge">${num}</div>
      <div class="podium-name">${p.nom}</div>
      <div class="podium-company">${p.entreprise}</div>
      <div class="podium-time">${p.temps}</div>
      <div class="podium-delta">${p.delta || 'LEADER'}</div>
      <div class="podium-car">${p.voiture}</div>
    `;
    section.appendChild(card);
  });
  section.style.display = 'grid';
}

function renderTable(players) {
  const body = document.getElementById('table-body');
  body.innerHTML = '';

  players.forEach((p, i) => {
    const row = document.createElement('div');
    const isTop = p.rang <= 3;
    row.className = `table-row${isTop ? ' top' : ''}`;
    row.style.animationDelay = `${0.4 + i*0.05}s`;

    const rankClass = p.rang === 1 ? 'rank-1' : p.rang === 2 ? 'rank-2' : p.rang === 3 ? 'rank-3' : 'rank-other';
    const deltaHtml = p.delta === 'LEADER' || p.rang === 1
      ? `<span class="leader-pill">LEADER</span>`
      : `<span>${p.delta}</span>`;

    row.innerHTML = `
      <div class="col-rank ${rankClass}">${p.rang}</div>
      <div class="col-name${isTop ? ' top' : ''}">${p.nom}</div>
      <div class="col-company">${p.entreprise}</div>
      <div class="col-time">${p.temps}</div>
      <div class="col-delta">${deltaHtml}</div>
    `;
    body.appendChild(row);
  });

  document.getElementById('table-wrap').style.display = 'block';
}

function updateTimestamp() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('last-update').textContent = `Mis à jour ${h}:${m}:${s}`;
}

async function refresh() {
  try {
    const players = await fetchData();
    if (players.length === 0) {
      document.getElementById('state-msg').innerHTML = '<div style="font-size:13px;color:var(--text-dim);letter-spacing:2px">AUCUNE DONNÉE DISPONIBLE</div>';
      return;
    }
    document.getElementById('state-msg').style.display = 'none';
    renderPodium(players);
    renderTable(players);
    document.getElementById('participant-count').textContent = `${players.length} PARTICIPANT${players.length > 1 ? 'S' : ''}`;
    updateTimestamp();
  } catch(e) {
    document.getElementById('state-msg').innerHTML = `
      <div style="color:var(--red);font-size:12px;letter-spacing:2px">ERREUR DE CHARGEMENT</div>
      <div style="font-size:10px;margin-top:8px;color:var(--text-dim)">Vérifie que le Sheets est bien partagé en lecture publique</div>
    `;
    console.error(e);
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
